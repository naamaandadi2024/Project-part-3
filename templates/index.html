<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Movie Rating Predictor</title>
</head>
<body>
    <h1>חיזוי דירוג סרט</h1>
    <form id="predictionForm">
        <label>שפה (Language):</label>
        <input type="text" id="Language" placeholder="למשל: English" required><br>

        <label>שנת התחלה (startYear):</label>
        <input type="number" id="startYear" placeholder="למשל: 2025" required><br>

        <label>דקות (runtimeMinutes):</label>
        <input type="number" id="runtimeMinutes" placeholder="למשל: 120" required><br>

        <label>ז'אנרים (genres):</label>
        <input type="text" id="genres" placeholder="Drama, Action" required><br>

        <label>מדינה (Country):</label>
        <input type="text" id="Country" placeholder="למשל: USA" required><br>

        <label>תקציר (plot):</label>
        <textarea id="plot" placeholder="תקציר הסרט..." required></textarea><br>

        <label>מזהי שחקנים (lead_actors_ids):</label>
        <input type="text" id="lead_actors_ids" placeholder="nm001, nm002" required><br>

        <button type="submit"><b>Predict Rating</b></button>
    </form>

    <div id="result" style="margin-top: 20px; font-weight: bold;"></div>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultDiv = document.getElementById('result');
            
            // תרגום אוטומטי של השחקנים לפורמט שהקוד בפייתון דורש
            let rawActors = document.getElementById('lead_actors_ids').value;
            let formattedActors = rawActors;
            if (!rawActors.trim().startsWith('[')) {
                formattedActors = "['" + rawActors.split(',').map(s => s.trim()).join("','") + "']";
            }
            
            const payload = {
                Language: document.getElementById('Language').value,
                startYear: parseFloat(document.getElementById('startYear').value),
                runtimeMinutes: parseFloat(document.getElementById('runtimeMinutes').value),
                genres: document.getElementById('genres').value,
                Country: document.getElementById('Country').value,
                plot: document.getElementById('plot').value,
                lead_actors_ids: formattedActors
            };

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.style.color = "green";
                    resultDiv.innerText = `Predicted Rating: ${data.predicted_rating.toFixed(1)} / 10`;
                } else {
                    resultDiv.style.color = "red";
                    resultDiv.innerText = `שגיאה: ${data.error}`;
                }
            } catch (error) {
                resultDiv.style.color = "red";
                resultDiv.innerText = "הקריאה לשרת נכשלה, אנא נסה שוב מאוחר יותר.";
            }
        });
    </script>
</body>
</html>
